<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="refresh" content="0; url=https://frostclient.eu/?openDownload=opengl"/>
<title>Redirecting... | Frost</title>
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<meta name="robots" content="noindex, follow">
<style>
  :root {
    --bg: #080c10;
    --frost-blue: #4fc8f8;
    --text: #e8f4fc;
    --muted: #6b8fa8;
    --border: rgba(79,200,248,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .spinner {
    width: 30px; height: 30px;
    border: 3px solid rgba(79,200,248,0.2);
    border-top-color: var(--frost-blue);
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: var(--muted); font-size: 15px; }
  a { color: var(--frost-blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
<script>
  window.location.replace("https://frostclient.eu/?openDownload=opengl");
</script>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <p>Opening the OpenGL download menu...<br/>Not working? <a href="https://frostclient.eu/?openDownload=opengl">Click here</a>.</p>
  </div>
</body>
</html>
