<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Secret Found | Frost</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080c10;
    --red: #d41212;
    --bg2: #0d1520;
    --surface: #111d2b;
    --surface2: #162233;
    --frost-blue: #4fc8f8;
    --frost-light: #a8e6f8;
    --frost-deep: #1a7fc4;
    --frost-glow: #00c8ff;
    --green: #3dff72;
    --text: #e8f4fc;
    --muted: #6b8fa8;
    --border: rgba(79,200,248,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; padding: 24px; text-align: center;
  }

  #cursor-glow {
    position: fixed;
    left: 0; top: 0;
    width: 560px; height: 560px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(0,200,255,0.10) 0%,
      rgba(79,200,248,0.04) 40%,
      transparent 70%);
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    will-change: transform, opacity;
    transition: opacity 0.35s ease;
    mix-blend-mode: screen;
  }

  .topo-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .topo-bg svg { width: 100%; height: 100%; opacity: 0.07; }
  #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 900px; height: 600px;
    background: radial-gradient(ellipse, rgba(0,200,255,0.14) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .secret-card { position: relative; z-index: 1; max-width: 520px; }
  .secret-icon {
    font-size: 56px; margin-bottom: 24px;
    filter: drop-shadow(0 0 24px rgba(79,200,248,0.6));
    animation: floatIcon 3s ease-in-out infinite;
  }
  @keyframes floatIcon { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-10px); } }
  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(34px, 6vw, 56px); font-weight: 700; letter-spacing: -1.5px;
    line-height: 1.05; margin-bottom: 20px;
    background: linear-gradient(90deg, #1a7fc4 0%, #4fc8f8 25%, #e8f8ff 50%, #4fc8f8 75%, #1a7fc4 100%);
    background-size: 220% 100%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 30px rgba(79,200,248,0.4));
    animation: shimmer 5s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{ background-position: 100% 50%; } 50%{ background-position: 0% 50%; } 100%{ background-position: 100% 50%; } }
  .secret-desc { font-size: 16px; color: var(--muted); line-height: 1.65; margin-bottom: 40px; }
  .secret-desc strong { color: var(--text); }
  .btn-claim {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--green); color: #000;
    padding: 18px 44px; border-radius: 10px;
    font-weight: 700; font-size: 16px;
    text-decoration: none; letter-spacing: 0.3px;
    font-family: 'Space Mono', monospace;
    box-shadow: 0 0 30px rgba(61,255,114,0.4);
    transition: box-shadow 0.2s, transform 0.15s;
    animation: pulseGlow 2.4s ease-in-out infinite;
  }
  .btn-claim:hover { box-shadow: 0 0 46px rgba(61,255,114,0.65); transform: translateY(-2px); animation-play-state: paused; }
  .btn-claim:active { transform: translateY(0) scale(0.97); }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 30px rgba(61,255,114,0.4); }
    50%      { box-shadow: 0 0 46px rgba(61,255,114,0.6); }
  }
  .secret-note { margin-top: 28px; font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="topo-bg">
  <svg viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs><style>.tline{fill:none;stroke:#4fc8f8;stroke-width:1.2;}</style></defs>
    <path class="tline" d="M-100,200 C100,180 250,240 400,200 S650,140 800,200 S1050,280 1200,220 S1400,160 1500,200"/>
    <path class="tline" d="M-100,270 C80,250 200,310 380,270 S600,190 760,265 S1000,340 1180,285 S1380,225 1500,265"/>
    <path class="tline" d="M-100,340 C60,320 180,380 360,340 S580,255 740,330 S980,400 1160,345 S1360,290 1500,335"/>
    <path class="tline" d="M-100,420 C40,400 160,460 340,420 S560,330 720,410 S960,470 1140,415 S1340,365 1500,415"/>
    <path class="tline" d="M-100,500 C20,480 140,540 320,500 S540,405 700,490 S940,545 1120,490 S1320,440 1500,490"/>
    <path class="tline" d="M-100,580 C0,558 120,618 300,580 S520,480 680,565 S920,625 1100,570 S1300,518 1500,568"/>
    <path class="tline" d="M-100,660 C-20,640 100,700 280,660 S500,560 660,645 S900,705 1080,650 S1280,598 1500,648"/>
    <path class="tline" d="M-100,740 C-40,720 80,780 260,740 S480,640 640,725 S880,785 1060,730 S1260,678 1500,728"/>
    <path class="tline" d="M200,100 C300,80 380,150 450,100 S600,40 700,110 S820,180 940,120 S1100,60 1200,100"/>
    <path class="tline" d="M150,160 C260,140 340,210 420,160 S570,95 670,165 S800,235 920,175 S1060,115 1160,160"/>
    <path class="tline" d="M250,820 C350,800 430,870 500,820 S650,755 750,825 S870,895 990,835 S1150,775 1250,820"/>
  </svg>
</div>

<canvas id="particles"></canvas>
<div id="cursor-glow"></div>
<div class="glow"></div>

<div class="secret-card">
  <div class="secret-icon">🔓</div>
  <h1>You found a secret.</h1>
  <p class="secret-desc">Not many people end up here. As a reward, here's <strong>your own early access key</strong> to Frost — ready to use, no waiting required.</p>
  <a class="btn-claim" href="https://frostclient.eu/?code=SEC-RET">Claim Secret Key</a>
  <p class="secret-note">This key can only be used once — first come, first served.</p>
</div>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

for (let i = 0; i < 100; i++) particles.push({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 1.5 + 0.5,
  speed: Math.random() * 0.4 + 0.1,
  drift: (Math.random() - 0.5) * 0.3,
  opacity: Math.random() * 0.4 + 0.1
});

(function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(168,230,248,${p.opacity})`;
    ctx.fill();
    p.y += p.speed; p.x += p.drift;
    if (p.y > H + 10) { p.y = -10; p.x = Math.random() * W; }
    if (p.x > W + 10) p.x = -10;
    if (p.x < -10) p.x = W + 10;
  }
  requestAnimationFrame(animateParticles);
})();

const cursorGlow = document.getElementById('cursor-glow');
const HALF = 280;

document.addEventListener('mousemove', (e) => {
  cursorGlow.style.transform = `translate(${e.clientX - HALF}px,${e.clientY - HALF}px)`;

  const under = document.elementFromPoint(e.clientX, e.clientY);
  const isInteractive = under && under.closest('a, button');
  cursorGlow.style.opacity = isInteractive ? '0' : '1';
});

document.addEventListener('mouseleave', () => { cursorGlow.style.opacity = '0'; });
</script>
</body>
</html>
